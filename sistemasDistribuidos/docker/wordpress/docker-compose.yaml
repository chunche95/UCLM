version: '3'
services:
  mariadb:
    image: mariadb:latest
    volumes:
      - 'mariadb_data:/var/lib/mariadb'
#    ports:
#      - "3306:3306"
    environment:
      # ALLOW_EMPTY_PASSWORD is recommended only for development.
      - ALLOW_EMPTY_PASSWORD=yes
      - MARIADB_USER=user
      - MARIADB_DATABASE=dbwordpress
  wordpress:
    image: wordpress:php8.2-fpm
    ports:
      - '80:8080'
      - '443:8443'
    volumes:
      - 'wordpress_data:/wordpress'
    depends_on:
      - mariadb
    environment:
      # ALLOW_EMPTY_PASSWORD is recommended only for development.
      - ALLOW_EMPTY_PASSWORD=yes
      - WORDPRESS_DATABASE_HOST=mariadb
      - WORDPRESS_DATABASE_PORT_NUMBER=3306
      - WORDPRESS_DATABASE_USER=user
      - WORDPRESS_DATABASE_NAME=dbwordpress
volumes:
  mariadb_data:
    driver: local
  wordpress_data:
    driver: local
